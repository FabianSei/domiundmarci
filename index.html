<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ein Baby ist da! 🐣</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ── CONFIG ─────────────────────────────────────────────── */
            /* Change BABY_GIRL in the <script> below to switch theme   */

            :root {
                --bg: #0d1117;
                --sky-top: #0a0f2e;
                --sky-mid: #1a2a5e;
                --sky-low: #2d4a8a;
                --moon: #f5c842;
                --star: rgba(255, 255, 255, 0.85);
                --text: #f0ece2;
                --text-sub: rgba(240, 236, 226, 0.6);
                /* accent colours set by JS */
                --accent: #7ec8e3;
                --accent2: #5ab4d6;
                --stork-leg: #ef8838;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "Inter", sans-serif;
                min-height: 100vh;
                overflow-x: hidden;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            /* ── SKY GRADIENT ───────────────────────────────────────── */
            .sky {
                position: fixed;
                inset: 0;
                background: linear-gradient(
                    180deg,
                    var(--sky-top) 0%,
                    var(--sky-mid) 55%,
                    var(--sky-low) 100%
                );
                z-index: 0;
            }

            /* ── STARS ──────────────────────────────────────────────── */
            .stars {
                position: fixed;
                inset: 0;
                z-index: 1;
                pointer-events: none;
            }
            .star {
                position: absolute;
                border-radius: 50%;
                background: var(--star);
                animation: twinkle var(--dur, 3s) ease-in-out infinite;
                animation-delay: var(--del, 0s);
            }
            @keyframes twinkle {
                0%,
                100% {
                    opacity: 0.2;
                    transform: scale(1);
                }
                50% {
                    opacity: 1;
                    transform: scale(1.3);
                }
            }

            /* ── MOON ───────────────────────────────────────────────── */
            .moon {
                position: fixed;
                top: 6vh;
                right: 10vw;
                width: clamp(60px, 10vw, 110px);
                height: clamp(60px, 10vw, 110px);
                border-radius: 50%;
                background: radial-gradient(
                    circle at 35% 35%,
                    #ffe97a,
                    var(--moon) 60%,
                    #c8960a
                );
                box-shadow:
                    0 0 40px 15px rgba(245, 200, 66, 0.25),
                    0 0 80px 30px rgba(245, 200, 66, 0.1);
                z-index: 2;
                animation: moonGlow 4s ease-in-out infinite;
            }
            @keyframes moonGlow {
                0%,
                100% {
                    box-shadow:
                        0 0 40px 15px rgba(245, 200, 66, 0.25),
                        0 0 80px 30px rgba(245, 200, 66, 0.1);
                }
                50% {
                    box-shadow:
                        0 0 55px 20px rgba(245, 200, 66, 0.4),
                        0 0 100px 40px rgba(245, 200, 66, 0.15);
                }
            }

            /* ── MAIN CONTENT ───────────────────────────────────────── */
            .content {
                position: relative;
                z-index: 10;
                width: 100%;
                max-width: 480px;
                padding: 2rem 1.5rem 4rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
            }

            /* ── STORK WRAPPER ──────────────────────────────────────── */
            .stork-wrap {
                margin-top: 3rem;
                width: clamp(240px, 64vw, 340px);
                animation: storkLand 1.4s cubic-bezier(0.22, 1, 0.36, 1)
                    forwards;
                transform-origin: center bottom;
            }
            @keyframes storkLand {
                0% {
                    transform: translateY(-120px) rotate(-8deg);
                    opacity: 0;
                }
                60% {
                    transform: translateY(12px) rotate(2deg);
                    opacity: 1;
                }
                80% {
                    transform: translateY(-6px) rotate(-1deg);
                }
                100% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 1;
                }
            }

            /* gentle hover bob after landing */
            .stork-wrap svg {
                animation: bob 4s ease-in-out 2s infinite;
                filter: drop-shadow(0 8px 11px rgba(0, 0, 0, 0.3));
                overflow: visible;
            }
            @keyframes bob {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-8px);
                }
            }

            /* Wing flap on load — pivots at the shoulder */
            .stork-wing-left,
            .stork-wing-right {
                transform-box: view-box;
                transform-origin: 178px 188px;
                animation: wingFlap 0.6s ease-in-out 1.3s 3 alternate;
            }
            .stork-wing-right {
                animation-delay: 1.4s;
            }
            @keyframes wingFlap {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(-8deg);
                }
            }

            /* ── BUNDLE BAG ─────────────────────────────────────────── */
            .bundle,
            .bundle-ribbon {
                transition: fill 0.8s ease;
            }
            /* the bundle sways gently from the beak */
            .bundle-swing {
                transform-box: view-box;
                transform-origin: 33px 150px;
                animation: bundleSwing 3.6s ease-in-out 2.2s infinite;
            }
            @keyframes bundleSwing {
                0%,
                100% {
                    transform: rotate(-2.5deg);
                }
                50% {
                    transform: rotate(2.5deg);
                }
            }

            /* ── HEADLINE ───────────────────────────────────────────── */
            .headline-wrap {
                margin-top: 2.5rem;
                text-align: center;
                animation: fadeUp 0.9s ease 1.6s both;
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .eyebrow {
                font-family: "Inter", sans-serif;
                font-size: 0.7rem;
                font-weight: 300;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                color: var(--text-sub);
                margin-bottom: 0.6rem;
            }
            h1 {
                font-family: "Playfair Display", serif;
                font-size: clamp(2.2rem, 8vw, 3.2rem);
                font-weight: 700;
                line-height: 1.1;
                color: var(--text);
            }
            h1 em {
                font-style: italic;
                color: var(--accent);
            }

            /* ── META (name / date) ─────────────────────────────────── */
            .meta {
                margin-top: 1.8rem;
                text-align: center;
                animation: fadeUp 0.9s ease 2s both;
            }
            .baby-name {
                font-family: "Playfair Display", serif;
                font-size: clamp(1.6rem, 6vw, 2.4rem);
                font-weight: 400;
                color: var(--accent);
                letter-spacing: 0.04em;
            }
            .birth-date {
                margin-top: 0.4rem;
                font-size: 0.85rem;
                font-weight: 300;
                color: var(--text-sub);
                letter-spacing: 0.08em;
            }

            /* ── DIVIDER ────────────────────────────────────────────── */
            .divider {
                margin: 2.2rem auto;
                width: 40px;
                height: 1px;
                background: var(--accent);
                opacity: 0.4;
                animation: fadeUp 0.9s ease 2.2s both;
            }

            /* ── FOOTER NOTE ────────────────────────────────────────── */
            .note {
                text-align: center;
                font-size: 0.8rem;
                font-weight: 300;
                color: var(--text-sub);
                line-height: 1.6;
                animation: fadeUp 0.9s ease 2.4s both;
            }

            /* ── CLOUD DECO ─────────────────────────────────────────── */
            .clouds {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                z-index: 3;
                pointer-events: none;
            }

            /* ── REDUCED MOTION ─────────────────────────────────────── */
            @media (prefers-reduced-motion: reduce) {
                *,
                *::before,
                *::after {
                    animation: none !important;
                }
                .stork-wrap {
                    opacity: 1;
                    transform: none;
                }
            }
        </style>
    </head>
    <body>

                        <path
                            class="bundle-ribbon"
                            d="M51,175 C54,183 56,189 57,194 L51,191 C50,186 50,180 49,176 Z"
                            fill="#c7e9f5"
                        />
                        <circle id="bundle-knot" cx="49" cy="173" r="4.6" fill="#5ab4d6" />
                    </g>
                </svg>
            </div>

            <!-- TEXT ──────────────────────────────────────────────────── -->
            <div class="headline-wrap">
                <p class="eyebrow">✦ &nbsp; Hurra! &nbsp; ✦</p>
                <h1 id="headline">
                    Ein kleines<br /><em id="headline-word">Wunder</em><br />ist
                    da!
                </h1>
            </div>

            <div class="meta">
                <div class="baby-name" id="baby-name">Baby Name</div>
                <div class="birth-date" id="birth-date">
                    Geburtsdatum · Uhrzeit
                </div>
            </div>

            <div class="divider"></div>

            <p class="note" id="footer-note">
                Herzlich willkommen auf der Welt 🌙
            </p>
        </main>

        <script>
            /* ════════════════════════════════════════════════════════════
             *  CONFIG  –  hier anpassen!
             * ════════════════════════════════════════════════════════════ */
            const BABY_GIRL = true; // true = Mädchen (rosa), false = Bub (blau)
            const HEADLINE_WORD = "Wunder"; // Wort in der Überschrift: „Ein kleines ___ ist da!"
            const BABY_NAME = "Baby Name"; // z.B. "Lena" oder "Elias"
            const BIRTH_DATE = "10. Juli 2025 · 03:42 Uhr";
            const FOOTER_NOTE = "Herzlich willkommen auf der Welt 🌙";
            /* ════════════════════════════════════════════════════════════ */

            // ── Theme-Farben ───────────────────────────────────────────
            const theme = BABY_GIRL
                ? {
                      accent: "#f4a0c0",
                      accent2: "#e8789e",
                      bundle: "#f4a0c0",
                      bundleTop: "#e8789e",
                      knot: "#e8789e",
                      ribbon: "#ffd4e6",
                  }
                : {
                      accent: "#7ec8e3",
                      accent2: "#5ab4d6",
                      bundle: "#7ec8e3",
                      bundleTop: "#5ab4d6",
                      knot: "#5ab4d6",
                      ribbon: "#c7e9f5",
                  };

            // CSS-Variablen setzen
            const root = document.documentElement;
            root.style.setProperty("--accent", theme.accent);
            root.style.setProperty("--accent2", theme.accent2);

            // Bundle-Farben im SVG
            document
                .querySelectorAll(".bundle")
                .forEach((el) => el.setAttribute("fill", theme.bundle));
            document
                .querySelectorAll(".bundle-ribbon")
                .forEach((el) => el.setAttribute("fill", theme.ribbon));
            document
                .getElementById("bundle-top")
                .setAttribute("stroke", theme.bundleTop);
            document
                .getElementById("bundle-knot")
                .setAttribute("fill", theme.knot);

            // Texte
            document.getElementById("headline-word").textContent = HEADLINE_WORD;
            document.getElementById("baby-name").textContent = BABY_NAME;
            document.getElementById("birth-date").textContent = BIRTH_DATE;
            document.getElementById("footer-note").textContent = FOOTER_NOTE;

            // ── Sterne generieren ──────────────────────────────────────
            const starsEl = document.getElementById("stars");
            for (let i = 0; i < 80; i++) {
                const s = document.createElement("div");
                s.className = "star";
                const size = Math.random() * 2.5 + 0.8;
                s.style.cssText = `
      width:  ${size}px;
      height: ${size}px;
      top:    ${Math.random() * 75}%;
      left:   ${Math.random() * 100}%;
      --dur:  ${(Math.random() * 3 + 2).toFixed(1)}s;
      --del:  ${(Math.random() * 4).toFixed(1)}s;
    `;
                starsEl.appendChild(s);
            }
        </script>
    </body>
</html>
